services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: always
    expose:
      - "80"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgresql+asyncpg://cardioclinic:${DB_PASSWORD}@db:5432/cardioclinic
      SECRET_KEY: ${SECRET_KEY}
      CORS_ORIGINS: '["http://${DOMAIN}", "https://${DOMAIN}"]'
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: cardioclinic
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: cardioclinic
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cardioclinic"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:

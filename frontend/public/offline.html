<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#4F46E5" />
  <title>Offline - CardioClinic</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Source Sans 3", system-ui, -apple-system, sans-serif;
      background: #F9FAFB;
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .container {
      text-align: center;
      max-width: 420px;
    }
    .icon-wrap {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
      background: linear-gradient(135deg, #4F46E5, #6366F1);
      border-radius: 1.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 24px rgba(79, 70, 229, 0.2);
    }
    .icon-wrap svg {
      width: 40px;
      height: 40px;
      color: white;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 0.75rem;
    }
    p {
      font-size: 1rem;
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    .last-sync {
      font-size: 0.8125rem;
      color: #94a3b8;
      background: #f1f5f9;
      border-radius: 0.5rem;
      padding: 0.75rem 1rem;
      margin-bottom: 1.5rem;
    }
    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: linear-gradient(135deg, #4F46E5, #6366F1);
      color: white;
      border: none;
      border-radius: 0.75rem;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      min-height: 44px;
      min-width: 44px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .retry-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(79, 70, 229, 0.3);
    }
    .retry-btn:active {
      transform: translateY(0);
    }
    .pulse-dot {
      width: 8px;
      height: 8px;
      background: #fbbf24;
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-size: 0.8125rem;
      color: #94a3b8;
      margin-top: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9.75v6.75m0 0l-3-3m3 3l3-3m-8.25 6a4.5 4.5 0 01-1.41-8.775 5.25 5.25 0 0110.233-2.33 3 3 0 013.758 3.848A3.752 3.752 0 0118 19.5H6.75z" />
      </svg>
    </div>
    <h1>You're Offline</h1>
    <p>CardioClinic will resume when connectivity returns. Your data is safe and will sync automatically.</p>
    <div class="last-sync" id="lastSync" style="display:none;">
      Last synced: <span id="syncTime"></span>
    </div>
    <button class="retry-btn" onclick="window.location.reload()">
      Try Again
    </button>
    <div class="status-bar">
      <div class="pulse-dot"></div>
      <span>Waiting for connection...</span>
    </div>
  </div>
  <script>
    // Show last sync time if stored
    const lastSync = localStorage.getItem('cardioclinic_last_sync');
    if (lastSync) {
      const el = document.getElementById('lastSync');
      const timeEl = document.getElementById('syncTime');
      if (el && timeEl) {
        try {
          timeEl.textContent = new Date(lastSync).toLocaleString();
          el.style.display = 'block';
        } catch (e) {}
      }
    }
    // Auto-reload when back online
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
